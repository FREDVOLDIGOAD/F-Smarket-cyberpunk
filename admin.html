<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoMarket Admin - Console d'Administration</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ADMIN HEADER -->
    <header class="cyber-glass">
        <div class="logo-container" onclick="navigateToAdmin('login')">
            <div class="logo-icon" style="border: 2px solid var(--color-purple); box-shadow: var(--glow-purple);"></div>
            <div class="logo-text">NEOMARKET <span style="font-size: 0.8rem; color: var(--color-purple); font-weight: 500; letter-spacing: 0.5px;">ADMIN</span></div>
        </div>

        <ul class="nav-links">
            <li id="nav-dashboard" class="active"><a onclick="navigateToAdmin('dashboard')">Tableau de bord</a></li>
            <li id="nav-logout"><a href="index.html" class="cyber-badge cyber-badge-pink" style="padding: 4px 8px; cursor: pointer;">Retour au site</a></li>
        </ul>
    </header>

    <!-- ADMIN DYNAMIC VIEW CONTAINER -->
    <main id="page-content" style="min-height: calc(100vh - 160px);">
        <!-- Rendered by admin.js -->
    </main>

    <!-- FLOATING DEVELOPER PAGE SWITCHER FOR ADMIN -->
    <div id="dev-page-switcher" class="cyber-purple-glass" style="width: 220px;">
        <div class="dev-header" onclick="toggleDevPanel()">
            <span class="dev-title">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
                PANELS ADMIN (2)
            </span>
            <svg id="dev-toggle-icon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="transform: rotate(0deg); transition: transform 0.3s;"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </div>
        <div class="dev-body" id="dev-panel-body">
            <!-- Populated by admin.js -->
        </div>
    </div>

    <!-- SIMPLE ADMIN FOOTER -->
    <footer class="cyber-glass" style="padding: 20px 4%;">
        <div style="display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; color: var(--text-muted);">
            <div>&copy; 2026 NeoMarket Admin Portal. Console Vendeur Unique.</div>
            <div>Identifiant: admin | Mdp: 12345678</div>
        </div>
    </footer>

    <!-- ADMIN APP LOGIC -->
    <script src="admin.js"></script>
</body>
</html>
